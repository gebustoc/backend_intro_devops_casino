apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-db
  labels:
    app: casino-db

spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-db
  template:
    metadata:
      labels:
        app: casino-db
    spec:

      containers:
        - name: casino-db
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/casino-db:latest
          ports:
            - containerPort: 5432
            
          # here because faster and easier for quickness, maybe i'll properly secret them later
          # i don't know if k8s supports this ${DB_PASS:-casino} type of formatting
          env:
            - name: POSTGRES_USER
              value: "casino"
            - name: POSTGRES_PASSWORD
              value: "casino"
            - name: POSTGRES_DB
              value: "casino_db"




          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
