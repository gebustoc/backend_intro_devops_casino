apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-db
  labels:
    app: casino-db

spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-db
  template:
    metadata:
      labels:
        app: casino-db
    spec:
      volumes:
        - name: pg-data
          hostPath:
            path: /var/lib/postgresql/data
            type: Directory

      containers:
        - name: casino-db
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/casino-db:latest
          env:
            - name: POSTGRES_USER
              value: "casino"
            - name: POSTGRES_PASSWORD
              value: "casino"
            - name: POSTGRES_DB
              value: "casino_db"


          ports:
            - containerPort: 5432

          volumeMounts:                 
            - name: pg-data
              mountPath: /var/lib/postgresql/data   

          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
