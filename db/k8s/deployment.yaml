apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-db
  labels:
    app: casino-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-db
  template:
    metadata:
      labels:
        app: casino-db
    spec:
      containers:
        - name: casino-db
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/casino-db:latest
          ports:
            - containerPort: 5432
          # Probe de "vivo": si falla, Kubernetes reinicia el contenedor.
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Probe de "listo": si falla, no recibe tráfico desde el Service.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"