apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-db
  labels:
    app: casino-db

spec:
  replicas: 1
  selector:
    matchLabels:
      app: casino-db
  template:
    metadata:
      labels:
        app: casino-db
    spec:
      terminationGracePeriodSeconds: 15
      volumes:
        - name: pg-data
          hostPath:
            path: /var/lib/postgresql/data
            type: Directory

      containers:
      
        - name: casino-db
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/casino-db:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "casino"
            - name: POSTGRES_PASSWORD
              value: "casino"
            - name: POSTGRES_DB
              value: "casino_db"


          volumeMounts:                 
            - name: pg-data
              mountPath: /var/lib/postgresql/data   

          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
              
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            periodSeconds: 10
          # 3. Liveness Probe: Triggers a container restart if the database locks up entirely
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            periodSeconds: 20