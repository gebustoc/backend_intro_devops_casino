apiVersion: v1
kind: Service
metadata:
  name: casino-db
  labels:
    app: casino-db
spec:
  # ClusterIP = solo accesible DENTRO del clúster.
  # Otros servicios lo alcanzan vía DNS interno: http://products-service:8001
  type: ClusterIP
  selector:
    app: casino-db
  ports:
      port: 5432        # puerto del Service (DNS interno)
      targetPort: 5432  # puerto del contenedor