apiVersion: apps/v1
kind: Deployment
metadata:
  name: estadisticas-service
  labels:
    app: estadisticas-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: estadisticas-service
  template:
    metadata:
      labels:
        app: estadisticas-service
    spec:
      containers:
        - name: estadisticas-service
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/estadisticas-service:latest
          ports:
            - containerPort: 3002
          # Probe de "vivo": si falla, Kubernetes reinicia el contenedor.
          livenessProbe:
            httpGet:
              path: /livez
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          # Probe de "listo": si falla, no recibe tráfico desde el Service.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"